<!DOCTYPE html><html><head><title>Login</title><link rel="stylesheet" href="style.css"><style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
overflow:hidden;
}

/* particle background */

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

/* login card */

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);

padding:40px;
border-radius:18px;
width:360px;

box-shadow:0 20px 50px rgba(0,0,0,0.4);

text-align:center;
border:1px solid rgba(255,255,255,0.2);

transition:0.3s;
}

.container:hover{
transform:translateY(-5px);
box-shadow:0 30px 60px rgba(0,0,0,0.5);
}

/* animated title */

.animated-title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;

background:linear-gradient(90deg,#00f2ff,#4facfe,#00f2ff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:glowMove 4s linear infinite;
}

@keyframes glowMove{
0%{background-position:0%;}
100%{background-position:200%;}
}

/* inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
outline:none;
}

/* button */

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1e40af;
}

a{
color:#60a5fa;
text-decoration:none;
}

</style></head><body><div id="particles-js"></div><div class="container"><h2 class="animated-title">Login</h2><input type="email" id="email" placeholder="Enter email"><input type="password" id="password" placeholder="Enter password"><button onclick="login()">Login</button>

<p><a href="forgot.html">Forgot Password?</a></p><p>New user? <a href="register.html">Register here</a></p></div><script src="https://cdn.jsdelivr.net/npm/particles.js"></script><script>

particlesJS("particles-js", {

particles:{
number:{ value:80 },
color:{ value:"#ffffff" },
shape:{ type:"circle" },
opacity:{ value:0.5 },
size:{ value:3 },

line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.4,
width:1
},

move:{
enable:true,
speed:2
}

},

interactivity:{
events:{
onhover:{ enable:true, mode:"repulse" }
}
},

retina_detect:true

});

</script><!-- Firebase authentication --><script type="module" src="auth.js"></script></body>
</html>
